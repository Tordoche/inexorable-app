# ── Build ────────────────────────────────────────────────────
[build]
  publish = "."
  functions = "netlify/functions"

# ── Redirects ────────────────────────────────────────────────
# Compatibilidad con URL antigua
[[redirects]]
  from = "/Inexorable.html"
  to   = "/"
  status = 301

# SPA fallback — cualquier ruta desconocida → index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# ── Seguridad global ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Sin caché en el HTML principal (siempre fresco)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

# Service worker — sin caché para recibir actualizaciones siempre
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store"
    Service-Worker-Allowed = "/"

# manifest.json sin caché para que iOS siempre lo lea
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type  = "application/manifest+json"
