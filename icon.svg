<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0072FF"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0072FF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect width="512" height="512" rx="112" fill="#000000"/>

  <!-- Subtle background glow -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(0,229,255,.04)" stroke-width="80"/>

  <!-- Arc top-right -->
  <path d="M 160 72 A 210 210 0 0 1 445 280" stroke="#00E5FF" stroke-width="24" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>

  <!-- Arc bottom-left -->
  <path d="M 67 235 A 200 200 0 0 0 245 448" stroke="#00E5FF" stroke-width="24" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>

  <!-- Bar 1 (shortest) -->
  <rect x="128" y="238" width="58" height="122" rx="10" fill="url(#barGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Bar 2 (medium) -->
  <rect x="210" y="182" width="58" height="178" rx="10" fill="url(#barGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Bar 3 (tallest) -->
  <rect x="292" y="140" width="58" height="220" rx="10" fill="url(#barGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Trend line -->
  <path d="M 90 370 C 160 310 220 265 310 195 L 390 170" stroke="url(#lineGrad)" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow2)" opacity="0.9"/>

  <!-- Glow halos on bars (soft) -->
  <rect x="128" y="238" width="58" height="122" rx="10" fill="#00E5FF" filter="url(#glow2)" opacity="0.15"/>
  <rect x="210" y="182" width="58" height="178" rx="10" fill="#00E5FF" filter="url(#glow2)" opacity="0.15"/>
  <rect x="292" y="140" width="58" height="220" rx="10" fill="#00E5FF" filter="url(#glow2)" opacity="0.15"/>
</svg>
